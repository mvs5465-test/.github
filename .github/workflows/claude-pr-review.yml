name: Claude PR Review (Reusable)

on:
  workflow_call:
    secrets:
      anthropic_api_key:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_args: |
            --model claude-sonnet-4-6 --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["APPROVE","REQUEST_CHANGES","COMMENT"]},"summary":{"type":"string"}},"required":["verdict","summary"]}'
          prompt: |
            Review this pull request using the following process:

            1. **Map the context**: Start by understanding what this PR is trying to accomplish.
               Read the title, description, and changed files to build a clear picture of the intent
               before evaluating anything.

            2. **Check for code smells**: Does anything feel unconventional or designed in an
               unproductive way? Look for over-engineering, awkward abstractions, misuse of
               patterns, or solutions that solve the wrong problem. Flag anything that seems
               like it will cause pain later.

            3. **Check consistency**: Does this change fit the style, patterns, and conventions
               of the rest of the codebase? Look at surrounding code for context. Inconsistency
               in naming, structure, error handling, or approach is worth calling out.

            4. **Check for appropriate testing**: Does the change include tests where it makes
               sense? If logic was added or changed, are there tests covering it? If tests are
               missing, is there a good reason, or is it an oversight?

            5. **General quality**: Bugs, security issues, missing error handling at system
               boundaries, and resource misconfigurations (especially in Kubernetes manifests).

            Post inline comments on specific lines where you find issues.

            Then output a JSON verdict:
            - "APPROVE" if the PR looks good to merge
            - "REQUEST_CHANGES" if there are issues that must be fixed
            - "COMMENT" if you have suggestions but nothing blocking

            Include a brief summary of your findings.

      - name: Submit GitHub review
        if: always() && steps.claude.outputs.structured_output != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT='${{ steps.claude.outputs.structured_output }}'
          VERDICT=$(echo "$OUTPUT" | jq -r '.verdict')
          SUMMARY=$(echo "$OUTPUT" | jq -r '.summary')

          case "$VERDICT" in
            APPROVE)
              gh pr review ${{ github.event.pull_request.number }} --approve --body "$SUMMARY"
              ;;
            REQUEST_CHANGES)
              gh pr review ${{ github.event.pull_request.number }} --request-changes --body "$SUMMARY"
              ;;
            *)
              gh pr review ${{ github.event.pull_request.number }} --comment --body "$SUMMARY"
              ;;
          esac
