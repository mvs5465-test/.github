name: Claude PR Review (Reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create sticky review posting script
        run: |
          cat > post-review.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ $# -ne 1 ]; then
            echo "Usage: post-review.sh <review-file>"
            exit 1
          fi
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$1" \
            --edit-last \
            --create-if-none
          EOF
          chmod +x post-review.sh

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(./post-review.sh:*),Write(review*.md),Read(review*.md),Edit(review*.md)"
          use_sticky_comment: "true"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request using the following process:

            1. **Map the context**: Start by understanding what this PR is trying to accomplish.
               Read the title, description, and changed files to build a clear picture of the
               intent before evaluating anything.

            2. **Check for code smells**: Does anything feel unconventional or designed in an
               unproductive way? Look for over-engineering, awkward abstractions, misuse of
               patterns, or solutions that solve the wrong problem.

            3. **Check consistency**: Does this change fit the style, patterns, and conventions
               of the rest of the codebase? Look at surrounding code for context.

            4. **Check for appropriate testing**: Does the change include tests where it makes
               sense? If logic was added or changed, are there tests covering it?

            5. **General quality**: Bugs, security issues, missing error handling at system
               boundaries, and resource misconfigurations (especially in Kubernetes manifests).

            6. **Resolve addressed review threads**: Find unresolved review threads previously
               created by Claude on this PR. If the code now addresses the finding in a thread,
               resolve that thread.

            7. **Severity threshold**: Only create review comments for findings that are
               medium severity or higher. Do not comment on low-severity or purely stylistic
               nits.

            8. **Explain why**: For each finding and in the final summary, explicitly state
               why the issue matters (risk, impact, or likely failure mode), not just what changed.

            Post inline comments on specific lines using mcp__github_inline_comment__create_inline_comment.

            Write a concise Markdown summary to `review.md`, then post it by running:
            `./post-review.sh review.md`
            This is required so each run updates one existing summary comment instead of adding a new one.

            Then submit a formal GitHub review using gh pr review:
            - If the PR looks good: `gh pr review <PR_NUMBER> --repo <REPO> --approve --body "<summary>"`
            - If there are blocking issues: `gh pr review <PR_NUMBER> --repo <REPO> --request-changes --body "<summary>"`
            - If suggestions only: `gh pr review <PR_NUMBER> --repo <REPO> --comment --body "<summary>"`
