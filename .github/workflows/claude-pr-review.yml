name: Claude PR Review (Reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create sticky review posting script
        run: |
          cat > post-review.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ $# -ne 1 ]; then
            echo "Usage: post-review.sh <review-file>"
            exit 1
          fi
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$1" \
            --edit-last \
            --create-if-none
          EOF
          chmod +x post-review.sh

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-3-5-haiku-latest
            --max-turns 4
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(./post-review.sh:*),Write(review*.md),Read(review*.md),Edit(review*.md)"
          use_sticky_comment: "true"
          include_fix_links: "false"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request quickly and with low token usage.

            Priorities:
            1. Focus only on changed lines/files in this PR.
            2. Flag only high-confidence, medium+ severity issues:
               bugs, security, data loss, broken behavior, missing required tests.
            3. Ignore style nits and low-impact suggestions.
            4. Keep analysis concise and avoid broad codebase exploration unless required.
            5. Resolve previously-open Claude threads only when the fix is clearly present.

            Post inline comments on specific lines using mcp__github_inline_comment__create_inline_comment.

            Write a short Markdown summary to `review.md` (max 8 bullets, max 120 words), then post it by running:
            `./post-review.sh review.md`
            If there are no medium+ findings, write exactly: `No medium+ findings.`
            This is required so each run updates one existing summary comment instead of adding a new one.

            Then submit a formal GitHub review using gh pr review:
            - If the PR looks good: `gh pr review <PR_NUMBER> --repo <REPO> --approve --body "<summary>"`
            - If there are blocking issues: `gh pr review <PR_NUMBER> --repo <REPO> --request-changes --body "<summary>"`
            - If suggestions only: `gh pr review <PR_NUMBER> --repo <REPO> --comment --body "<summary>"`
