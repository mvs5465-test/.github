name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      reviewer:
        description: 'Which AI reviewer to use: claude or codex'
        type: string
        default: 'claude'
    secrets:
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      REVIEWER_APP_ID:
        required: true
      REVIEWER_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Pre-fetch base and head refs for PR context
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Claude Review
        id: claude
        if: ${{ inputs.reviewer == 'claude' }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE SHA: ${{ github.event.pull_request.base.sha }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            Review only the files changed in this pull request.
            Use git history diff between BASE SHA and HEAD SHA (not working tree diff).
            Use these commands:
            - `git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}`
            - `git diff --unified=0 ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}`

            Flag only high-confidence medium+ severity issues: bugs, security, data loss, broken behavior, missing required tests.
            Ignore style, nits, and low-impact suggestions.

            Output must be valid Markdown in exactly this format:
            RESULT: PASS | FAIL
            SUMMARY: <concise reason>
            DETAILS: <specific changes requested>

            Rules:
            - Use RESULT: PASS only when the PR is ready to merge.
            - If uncertain or missing context, use RESULT: FAIL.
            - DETAILS should be actionable and specific to changed code.
          claude_args: "--max-turns 3"

      - name: Extract Claude output
        id: claude-output
        if: ${{ inputs.reviewer == 'claude' && steps.claude.outputs.execution_file != '' }}
        run: |
          exec_file="${{ steps.claude.outputs.execution_file }}"
          message=$(jq -r '[.[] | select(.type=="assistant") | .message.content[] | select(.type=="text") | .text] | last' "$exec_file")
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$message" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Codex PR Review
        id: codex
        if: ${{ inputs.reviewer == 'codex' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.2-codex
          effort: low
          sandbox: read-only
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE SHA: ${{ github.event.pull_request.base.sha }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            Review only the files changed in this pull request.
            Use git history diff between BASE SHA and HEAD SHA (not working tree diff).
            Use these commands:
            - `git diff --name-only BASE...HEAD`
            - `git diff --unified=0 BASE...HEAD`

            Flag only high-confidence medium+ severity issues: bugs, security, data loss, broken behavior, missing required tests.
            Ignore style, nits, and low-impact suggestions.

            Output must be valid Markdown in exactly this format:
            RESULT: PASS | FAIL
            SUMMARY: <concise reason>
            DETAILS: <specific changes requested>

            Rules:
            - Use RESULT: PASS only when the PR is ready to merge.
            - If uncertain or missing context, use RESULT: FAIL.
            - DETAILS should be actionable and specific to changed code.

      - name: Prepare review body
        env:
          REVIEWER: ${{ inputs.reviewer }}
          CODEX_MESSAGE: ${{ steps.codex.outputs.final-message }}
          CLAUDE_MESSAGE: ${{ steps.claude-output.outputs.message }}
        run: |
          raw_file="$(mktemp)"

          if [ "$REVIEWER" = "codex" ]; then
            MESSAGE="$CODEX_MESSAGE"
          else
            MESSAGE="$CLAUDE_MESSAGE"
          fi

          printf "%s\n" "$MESSAGE" > "${raw_file}"

          result="$(grep -E '^RESULT:' "${raw_file}" | head -n1 | sed -E 's/^RESULT:[[:space:]]*//' | tr '[:lower:]' '[:upper:]')"
          summary="$(grep -E '^SUMMARY:' "${raw_file}" | head -n1 | sed -E 's/^SUMMARY:[[:space:]]*//')"
          details="$(awk '
            /^DETAILS:/ {
              sub(/^DETAILS:[[:space:]]*/, "", $0)
              print
              in_details=1
              next
            }
            in_details { print }
          ' "${raw_file}")"

          if [ "${result}" != "PASS" ] && [ "${result}" != "FAIL" ]; then
            result="FAIL"
          fi

          if [ -z "${summary}" ]; then
            if [ "${result}" = "PASS" ]; then
              summary="No blocking issues identified."
            else
              summary="Defaulting to FAIL because the review output was incomplete or ambiguous."
            fi
          fi

          if [ -z "${details}" ]; then
            if [ "${result}" = "PASS" ]; then
              details="No changes requested."
            else
              details="Please review the changed files again and provide explicit PASS/FAIL output with concrete requested changes."
            fi
          fi

          {
            echo "RESULT: ${result}"
            echo "SUMMARY: ${summary} [reviewed by ${REVIEWER}]"
            echo "DETAILS: ${details}"
          } > review.md

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_PRIVATE_KEY }}

      - name: Submit formal review
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          result="$(grep -E '^RESULT:' review.md | head -n1 | sed -E 's/^RESULT:[[:space:]]*//' | tr '[:lower:]' '[:upper:]')"
          body="$(cat review.md)"

          if [ "${result}" = "PASS" ]; then
            gh pr review "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --approve \
              --body "${body}"
          else
            gh pr review "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --request-changes \
              --body "${body}"
          fi
