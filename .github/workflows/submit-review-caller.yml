name: Submit Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        type: number
        required: true
      verdict:
        description: 'Review verdict: approve or request-changes'
        type: choice
        options:
          - approve
          - request-changes
        required: true
      detail:
        description: 'Review body text (markdown supported)'
        type: string
        required: true

jobs:
  submit:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/submit-review.yml
    with:
      pr_number: ${{ inputs.pr_number }}
      verdict: ${{ inputs.verdict }}
      detail: ${{ inputs.detail }}
    secrets: inherit
