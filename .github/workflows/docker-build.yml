name: Docker Build (Reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name without registry prefix (example: owner/repo)'
        type: string
        required: false
        default: ''
      context:
        description: 'Docker build context path'
        type: string
        required: false
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        required: false
        default: './Dockerfile'
      platforms:
        description: 'Target platforms'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Force push outside main (main always pushes)'
        type: boolean
        required: false
        default: false
      registry:
        description: 'Container registry host'
        type: string
        required: false
        default: 'ghcr.io'
      promote_argocd_source:
        description: 'Commit the built digest into a chart/.argocd-source-<repo>.yaml file on main'
        type: boolean
        required: false
        default: false
      argocd_source_file:
        description: 'Path to the ArgoCD source override file'
        type: string
        required: false
        default: ''
      argocd_image_repository_param:
        description: 'Helm parameter name for image repository in the ArgoCD source file'
        type: string
        required: false
        default: 'image.repository'
      argocd_image_tag_param:
        description: 'Helm parameter name for image tag in the ArgoCD source file'
        type: string
        required: false
        default: 'image.tag'
      argocd_commit_message_prefix:
        description: 'Commit message prefix for ArgoCD source updates'
        type: string
        required: false
        default: 'chore(deploy): update image digest to'
    outputs:
      digest:
        description: 'Built image digest'
        value: ${{ jobs.docker.outputs.digest }}
      tags:
        description: 'Resolved image tags'
        value: ${{ jobs.docker.outputs.tags }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
      cancel-in-progress: true
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        if: ${{ github.ref == 'refs/heads/main' || inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name != '' && inputs.image_name || github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout caller repo with GH_PAT
        if: ${{ inputs.promote_argocd_source && github.ref == 'refs/heads/main' }}
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Write ArgoCD source override
        if: ${{ inputs.promote_argocd_source && github.ref == 'refs/heads/main' }}
        env:
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}
          INPUT_REGISTRY: ${{ inputs.registry }}
          INPUT_SOURCE_FILE: ${{ inputs.argocd_source_file }}
          INPUT_REPOSITORY_PARAM: ${{ inputs.argocd_image_repository_param }}
          INPUT_TAG_PARAM: ${{ inputs.argocd_image_tag_param }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          source_file="${INPUT_SOURCE_FILE:-chart/.argocd-source-${repo_name}.yaml}"
          image_repo="${INPUT_REGISTRY}/${INPUT_IMAGE_NAME:-$GITHUB_REPOSITORY}"

          mkdir -p "$(dirname "$source_file")"
          cat > "$source_file" <<EOF
          helm:
            parameters:
            - name: ${INPUT_REPOSITORY_PARAM}
              value: ${image_repo}
              forcestring: true
            - name: ${INPUT_TAG_PARAM}
              value: main@${IMAGE_DIGEST}
              forcestring: true
          EOF

      - name: Commit ArgoCD source override
        if: ${{ inputs.promote_argocd_source && github.ref == 'refs/heads/main' }}
        env:
          INPUT_SOURCE_FILE: ${{ inputs.argocd_source_file }}
          COMMIT_MESSAGE_PREFIX: ${{ inputs.argocd_commit_message_prefix }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          source_file="${INPUT_SOURCE_FILE:-chart/.argocd-source-${repo_name}.yaml}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$source_file"
          git diff --staged --quiet || git commit -m "${COMMIT_MESSAGE_PREFIX} main@${IMAGE_DIGEST}"
          git push
