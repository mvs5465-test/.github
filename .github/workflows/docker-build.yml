name: Docker Build (Reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name without registry prefix (example: owner/repo)'
        type: string
        required: true
      context:
        description: 'Docker build context path'
        type: string
        required: false
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        required: false
        default: './Dockerfile'
      platforms:
        description: 'Target platforms'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Push image to registry'
        type: boolean
        required: false
        default: false
      tags:
        description: 'Optional newline-separated tags override'
        type: string
        required: false
        default: ''
      registry:
        description: 'Container registry host'
        type: string
        required: false
        default: 'ghcr.io'
    outputs:
      digest:
        description: 'Built image digest'
        value: ${{ jobs.docker.outputs.digest }}
      tags:
        description: 'Resolved image tags'
        value: ${{ jobs.docker.outputs.tags }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}
          tags: ${{ inputs.tags != '' && inputs.tags || format('type=ref,event=branch\ntype=sha,prefix={0}-', github.ref_name) }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
