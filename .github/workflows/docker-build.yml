name: Docker Build (Reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name without registry prefix (example: owner/repo)'
        type: string
        required: false
        default: ''
      context:
        description: 'Docker build context path'
        type: string
        required: false
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        required: false
        default: './Dockerfile'
      platforms:
        description: 'Target platforms'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Force push outside main (main always pushes)'
        type: boolean
        required: false
        default: false
      registry:
        description: 'Container registry host'
        type: string
        required: false
        default: 'ghcr.io'
    outputs:
      digest:
        description: 'Built image digest'
        value: ${{ jobs.docker.outputs.digest }}
      tags:
        description: 'Resolved image tags'
        value: ${{ jobs.docker.outputs.tags }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
      cancel-in-progress: true
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        if: ${{ github.ref == 'refs/heads/main' || inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name != '' && inputs.image_name || github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
